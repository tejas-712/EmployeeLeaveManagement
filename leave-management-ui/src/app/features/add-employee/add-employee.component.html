<div class="add-employee-container">
  <h2>Add Employee</h2>
  <form (ngSubmit)="onSubmit()" #empForm="ngForm" class="add-employee-form">
    
    <div class="form-group">
      <label for="associateId">Associate ID</label>
      <input type="text" id="associateId" name="associateId" [(ngModel)]="employee.associateId" required class="form-control" />
    </div>

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" [(ngModel)]="employee.name" required class="form-control" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" [(ngModel)]="employee.password" required class="form-control" />
    </div>

    <div class="form-group">
      <label for="roleId">Role</label>
      <select id="roleId" name="roleId" [(ngModel)]="employee.roleId" required class="form-control">
        <option [ngValue]="0" disabled selected>Select a Role</option>
        <option [ngValue]="1">Associate</option>
        <option [ngValue]="2">Senior Associate</option>
        <option [ngValue]="3">Manager</option>
        <option [ngValue]="4">Admin</option>
      </select>
    </div>

    <div class="form-group">
      <label for="locationId">Location</label>
      <select id="locationId" name="locationId" [(ngModel)]="employee.locationId" required class="form-control">
        <option [ngValue]="0" disabled selected>Select a Location</option>
        <option [ngValue]="1">Pune</option>
        <option [ngValue]="2">Hyderabad</option>
        <option [ngValue]="3">Chennai</option>
        <option [ngValue]="4">Kolkata</option>
        <option [ngValue]="5">Bangalore</option>
      </select>
    </div>

    <button type="submit" class="btn-primary" 
            [disabled]="empForm.invalid || employee.roleId === 0 || employee.locationId === 0">
      Add Employee
    </button>
  </form>
  
  <div *ngIf="message" class="success-message">{{ message }}</div>
  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
</div>
