<div class="holidays-widget">
  
  <div class="widget-header">
    <h3 class="widget-title">Upcoming Holidays</h3>
  </div>

  <div class="holiday-cards-container">
    
    <div class="holiday-item-card" *ngFor="let holiday of holidays">
      
      <div class="holiday-icon" [ngClass]="holiday.type === 'National' ? 'bg-national' : 'bg-regional'">
        {{ holiday.name.charAt(0) }}
      </div>

      <div class="holiday-details">
        <h4>{{ holiday.name }}</h4>
        <span class="holiday-type-pill">{{ holiday.type }}</span>
      </div>

      <div class="holiday-date-badge">
        <span class="date-day">{{ holiday.date | date:'dd' }}</span>
        <span class="date-month">{{ holiday.date | date:'MMM' }}</span>
      </div>
      
    </div>
    
    <div *ngIf="holidays.length === 0" class="no-holidays-card">
      <p>No upcoming holidays for your location.</p>
    </div>

  </div>
</div>
