<div class="modal-overlay" (click)="onClose()">
  
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <div class="card shadow-sm apply-card">
      
      <div class="card-header border-bottom modal-header">
        <div>
          <h2>Submit Leave Request</h2>
          <p class="subtitle">Schedule and track your upcoming time off.</p>
        </div>
        <button class="close-btn" (click)="onClose()">✖</button>
      </div>

      <div class="alert" *ngIf="statusMessage" 
           [ngClass]="{'alert-danger': isError, 'alert-success': !isError}">
        {{ statusMessage }}
      </div>

      <div class="form-body">
        <div class="form-group">
          <label>Associate ID</label>
          <input type="text" [value]="associateId" class="form-control disabled-input" disabled />
        </div>

        <div class="form-row">
          <div class="form-group col">
            <label for="leaveDate">Date of Absence</label>
            <input type="date" id="leaveDate" [(ngModel)]="leaveDate" class="form-control" />
          </div>

          <div class="form-group col">
            <label for="absenceType">Leave Type</label>
            <select id="absenceType" [(ngModel)]="absenceType" class="form-control">
              <option value="V">Vacation / Earned</option>
              <option value="S">Sick Leave</option>
              <option value="C">Casual Leave</option>
            </select>
          </div>
        </div>

        <div class="form-actions border-top pt-3 mt-3">
          <button class="btn-primary" (click)="onSubmit()">Submit Request</button>
          <button class="btn-secondary ml-2" (click)="onClose()">Cancel</button>
        </div>
      </div>
      
    </div>
  </div>
</div>
