<div class="login-container">
  <div class="login-card">
    <h2>System Login</h2>
    <p>Enter your credentials to access the Leave Tracker.</p>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label for="associateId">Associate ID</label>
      <input 
        type="text" 
        id="associateId" 
        [(ngModel)]="associateId" 
        placeholder="e.g., 2241254" 
        class="form-control"
        (keyup.enter)="onLogin()"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input 
        type="password" 
        id="password" 
        [(ngModel)]="password" 
        placeholder="Enter password" 
        class="form-control"
        (keyup.enter)="onLogin()"
      />
    </div>

    <button class="btn-primary" (click)="onLogin()">Login</button>
  </div>
</div>
