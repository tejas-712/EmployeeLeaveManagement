<div class="page-wrapper">
  <div class="card shadow-sm login-card">
    <div class="card-header text-center">
      <h2>System Access</h2>
      <p class="subtitle">Enter your credentials to manage your time off.</p>
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="form-body">
      <div class="form-group">
        <label for="associateId">Associate ID</label>
        <input type="text" id="associateId" [(ngModel)]="associateId" 
               placeholder="e.g., 2241254" class="form-control" (keyup.enter)="onLogin()" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="password" 
               placeholder="••••••••" class="form-control" (keyup.enter)="onLogin()" />
      </div>

      <button class="btn-primary full-width mt-3" (click)="onLogin()">Login</button>
    </div>
  </div>
</div>
